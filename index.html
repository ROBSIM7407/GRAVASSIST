<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GravAssist</title>

    <style>
        body{
            margin:0;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:#eef3ea;
        }

        header{
            background:#2d6a4f;
            color:white;
            text-align:center;
            padding:18px;
            font-size:28px;
            font-weight:bold;
        }

        #map{
            display:flex;
            justify-content:center;
            padding:20px;
        }

        #map img{
            width:100%;
            max-width:1100px;
            border-radius:10px;
            box-shadow:0 4px 12px rgba(0,0,0,.25);
        }

        #footer{
            text-align:center;
            padding:20px;
            color:#555;
        }
    </style>

</head>

<body>

<header>
🌿 GravAssist – Område 1
</header>

<div id="map">
    <img src="område1.jpg" alt="Område 1">
</div>

<div id="footer">
Version 0.1 – Kartan är inläst.
</div>

</body>
</html>
